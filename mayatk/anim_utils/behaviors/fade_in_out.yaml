description: "Fade objects in at scene start and out at scene end via visibility."
attributes:
  visibility:
    in:
      anchor: start
      offset: 0
      duration: 15
      values: [0.0, 1.0]
      tangent: linear
    out:
      anchor: end
      offset: 0
      duration: 15
      values: [1.0, 0.0]
      tangent: linear
